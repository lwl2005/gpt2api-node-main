<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - GPT2API Node</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .glass { backdrop-filter: blur(24px); background: rgba(255,255,255,0.08); }
    .glass-card { backdrop-filter: blur(24px); background: rgba(255,255,255,0.9); }
    .gradient-bg {
      background: #0a0e1a;
      position: relative; overflow: hidden;
    }
    canvas#particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
    .login-card { animation: cardIn 0.6s cubic-bezier(.21,1.02,.73,1); position: relative; z-index: 10; }
    @keyframes cardIn { from { opacity: 0; transform: translateY(40px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .logo-glow { animation: glow 3s ease-in-out infinite alternate; }
    @keyframes glow {
      0% { box-shadow: 0 0 20px rgba(59,130,246,0.3), 0 0 60px rgba(99,102,241,0.1); }
      100% { box-shadow: 0 0 30px rgba(59,130,246,0.5), 0 0 80px rgba(99,102,241,0.2); }
    }
    .input-wrap { position: relative; transition: all 0.3s; }
    .input-wrap:focus-within { transform: translateY(-1px); }
    .input-wrap:focus-within .input-border { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59,130,246,0.1); }
    .input-wrap:focus-within .input-icon { color: #3b82f6; }
    .input-border { transition: all 0.3s; }
    .login-btn { position: relative; overflow: hidden; }
    .login-btn::after {
      content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0;
      background: rgba(255,255,255,0.15); border-radius: 50%;
      transform: translate(-50%, -50%); transition: width 0.5s, height 0.5s;
    }
    .login-btn:hover::after { width: 400px; height: 400px; }
    .version-badge { backdrop-filter: blur(12px); background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); }
    .float-dots > span {
      position: absolute; border-radius: 50%; opacity: 0;
      animation: floatUp 6s ease-in infinite;
    }
    @keyframes floatUp {
      0% { opacity: 0; transform: translateY(0) scale(0); }
      10% { opacity: 0.6; }
      90% { opacity: 0; }
      100% { transform: translateY(-800px) scale(1); opacity: 0; }
    }
  </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
  <canvas id="particleCanvas"></canvas>

  <div class="float-dots" id="floatDots"></div>

  <div class="w-full max-w-[420px] login-card">
    <!-- Logo -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-[72px] h-[72px] bg-gradient-to-br from-blue-500 via-indigo-500 to-violet-600 rounded-2xl mb-5 logo-glow">
        <i class="fas fa-cube text-white text-[28px]"></i>
      </div>
      <h1 class="text-[32px] font-extrabold text-white tracking-tight">GPT2API</h1>
      <div class="inline-flex items-center mt-3 px-3 py-1.5 rounded-full version-badge">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 mr-2 animate-pulse"></span>
        <span class="text-[11px] font-medium text-slate-400 tracking-wide">v3.0 CONTROL PANEL</span>
      </div>
    </div>

    <!-- Card -->
    <div class="glass-card rounded-3xl shadow-2xl shadow-black/30 p-8 border border-white/30">
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="mb-5 input-wrap">
          <label class="block text-[13px] font-semibold text-slate-600 mb-2">用户名</label>
          <div class="input-border flex items-center border border-slate-200/80 rounded-2xl px-4 py-3.5 bg-white/60">
            <i class="fas fa-user text-slate-400 mr-3 text-sm input-icon transition-colors"></i>
            <input type="text" id="username" class="flex-1 outline-none bg-transparent text-slate-800 placeholder-slate-400 text-[15px]" placeholder="请输入用户名" required autocomplete="username" />
          </div>
        </div>

        <div class="mb-5 input-wrap">
          <label class="block text-[13px] font-semibold text-slate-600 mb-2">密码</label>
          <div class="input-border flex items-center border border-slate-200/80 rounded-2xl px-4 py-3.5 bg-white/60">
            <i class="fas fa-lock text-slate-400 mr-3 text-sm input-icon transition-colors"></i>
            <input type="password" id="password" class="flex-1 outline-none bg-transparent text-slate-800 placeholder-slate-400 text-[15px]" placeholder="请输入密码" required autocomplete="current-password" />
            <button type="button" onclick="togglePasswordVisibility()" class="text-slate-400 hover:text-slate-600 transition ml-2">
              <i class="fas fa-eye text-sm" id="pwdToggleIcon"></i>
            </button>
          </div>
        </div>

        <div class="flex items-center justify-between mb-6">
          <label class="flex items-center cursor-pointer group">
            <input type="checkbox" id="rememberMe" class="w-4 h-4 rounded border-slate-300 text-blue-500 focus:ring-blue-500/20 mr-2" />
            <span class="text-[13px] text-slate-500 group-hover:text-slate-700 transition">记住我</span>
          </label>
        </div>

        <div id="errorMessage" class="hidden mb-5 p-3.5 bg-red-50 border border-red-100 rounded-2xl">
          <div class="flex items-center">
            <div class="w-8 h-8 bg-red-100 rounded-lg flex items-center justify-center mr-3 flex-shrink-0">
              <i class="fas fa-exclamation-circle text-red-500 text-sm"></i>
            </div>
            <span class="text-sm text-red-600 font-medium" id="errorText"></span>
          </div>
        </div>

        <button type="submit" id="loginBtn"
          class="login-btn w-full bg-gradient-to-r from-blue-500 via-indigo-500 to-violet-600 text-white py-4 rounded-2xl font-bold text-[15px] shadow-lg shadow-blue-500/25 hover:shadow-blue-500/40 hover:from-blue-600 hover:via-indigo-600 hover:to-violet-700 transition-all duration-300 flex items-center justify-center">
          <span>登录系统</span>
          <i class="fas fa-arrow-right ml-2.5 text-sm"></i>
        </button>
      </form>
    </div>

    <!-- Footer hint -->
    <div class="mt-6 text-center">
      <div class="glass inline-flex items-center px-4 py-2.5 rounded-2xl border border-white/10">
        <i class="fas fa-lightbulb text-amber-400 text-xs mr-2"></i>
        <span class="text-[11px] text-slate-500">
          默认 <code class="font-mono text-slate-300 bg-white/10 px-1.5 py-0.5 rounded-md mx-0.5">admin</code>
          / <code class="font-mono text-slate-300 bg-white/10 px-1.5 py-0.5 rounded-md mx-0.5">admin123</code>
        </span>
      </div>
    </div>
  </div>

  <script>
    // Particle background
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    const PARTICLE_COUNT = 60;

    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.4;
        this.vy = (Math.random() - 0.5) * 0.4;
        this.r = Math.random() * 2 + 0.5;
        this.alpha = Math.random() * 0.4 + 0.1;
      }
      update() {
        this.x += this.vx; this.y += this.vy;
        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(99, 130, 246, ${this.alpha})`;
        ctx.fill();
      }
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

    function drawLines() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 150) {
            ctx.strokeStyle = `rgba(99, 130, 246, ${0.08 * (1 - dist / 150)})`;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      drawLines();
      requestAnimationFrame(animate);
    }
    animate();

    // Floating dots
    const dotsContainer = document.getElementById('floatDots');
    for (let i = 0; i < 15; i++) {
      const span = document.createElement('span');
      const size = Math.random() * 4 + 2;
      span.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;bottom:-10px;background:rgba(99,130,246,${Math.random()*0.4+0.1});animation-delay:${Math.random()*6}s;animation-duration:${Math.random()*4+4}s;`;
      dotsContainer.appendChild(span);
    }

    // Password visibility toggle
    function togglePasswordVisibility() {
      const pwd = document.getElementById('password');
      const icon = document.getElementById('pwdToggleIcon');
      if (pwd.type === 'password') { pwd.type = 'text'; icon.className = 'fas fa-eye-slash text-sm'; }
      else { pwd.type = 'password'; icon.className = 'fas fa-eye text-sm'; }
    }

    // Login
    async function handleLogin(event) {
      event.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('errorMessage');
      const errorText = document.getElementById('errorText');
      const loginBtn = document.getElementById('loginBtn');

      errorDiv.classList.add('hidden');
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i>登录中...';

      try {
        const response = await fetch('/admin/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await response.json();
        if (response.ok) {
          loginBtn.innerHTML = '<i class="fas fa-check mr-2"></i>登录成功';
          loginBtn.classList.remove('from-blue-500', 'via-indigo-500', 'to-violet-600');
          loginBtn.classList.add('from-emerald-500', 'to-green-600');
          setTimeout(() => { window.location.href = '/admin/'; }, 600);
        } else {
          errorText.textContent = data.error || '登录失败';
          errorDiv.classList.remove('hidden');
          errorDiv.style.animation = 'none';
          errorDiv.offsetHeight;
          errorDiv.style.animation = 'cardIn 0.3s ease-out';
        }
      } catch (error) {
        errorText.textContent = '网络错误: ' + error.message;
        errorDiv.classList.remove('hidden');
      } finally {
        if (!document.querySelector('.from-emerald-500')) {
          loginBtn.disabled = false;
          loginBtn.innerHTML = '<span>登录系统</span><i class="fas fa-arrow-right ml-2.5 text-sm"></i>';
        }
      }
    }

    // Enter key
    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('loginForm').requestSubmit();
    });

    // Auto-focus
    document.getElementById('username').focus();
  </script>
</body>
</html>
